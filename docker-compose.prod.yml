services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      target: prod
    env_file: backend/.env.production
    environment:
      REDIS_URL: redis://redis:6379/0
    expose:
      - "8000"
    volumes:
      - uploads:/var/app/uploads
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      target: prod
    env_file: backend/.env.production
    environment:
      REDIS_URL: redis://redis:6379/0
    command: python worker.py
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      target: prod
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    restart: unless-stopped

volumes:
  uploads:
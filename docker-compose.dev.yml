services:
  postgres:
    image: postgres:16-alpine
    container_name: studybuddy-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: studybuddy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d studybuddy" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: studybuddy-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      target: dev
    env_file:
      - backend/.env.dev
    container_name: studybuddy-backend-dev
    restart: unless-stopped
    environment:
      ENVIRONMENT: dev
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/studybuddy
      DEBUG: "true"
      ALGORITHM: HS256
      ALLOWED_ORIGINS: '["http://localhost:5173"]'
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_dev_uploads:/app/uploads

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      target: dev
    env_file:
      - backend/.env.dev
    container_name: studybuddy-worker-dev
    restart: unless-stopped
    command: [ "python", "worker.py" ]
    environment:
      ENVIRONMENT: dev
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/studybuddy
      DEBUG: "true"
      ALGORITHM: HS256
      ALLOWED_ORIGINS: '["http://localhost:5173"]'
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_dev_uploads:/app/uploads

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      target: dev
    container_name: studybuddy-frontend-dev
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_dev_node_modules:/app/node_modules

volumes:
  postgres_dev_data:
  redis_dev_data:
  backend_dev_uploads:
  frontend_dev_node_modules:
